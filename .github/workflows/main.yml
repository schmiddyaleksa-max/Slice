name: Build qmod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip jq

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Download QPM
        run: |
          RELEASE_JSON=$(curl -sL https://api.github.com/repos/QuestPackageManager/QPM.CLI/releases/latest)
          QPM_VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name')

          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            QPM_BINARY="qpm-linux-x64"
          elif [ "$ARCH" = "aarch64" ]; then
            QPM_BINARY="qpm-linux-aarch64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi

          QPM_URL="https://github.com/QuestPackageManager/QPM.CLI/releases/download/${QPM_VERSION}/${QPM_BINARY}.zip"
          echo "Downloading QPM from: $QPM_URL"
          curl -sLo qpm.zip "$QPM_URL"
          unzip -o qpm.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/qpm

      - name: QPM Restore
        run: qpm restore

      - name: Build
        run: |
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          export NDK_PATH=${{ steps.setup-ndk.outputs.ndk-path }}
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -G Ninja
          cmake --build build --config Release

      - name: Create qmod
        run: |
          MOD_ID=$(jq -r '.info.id' qpm.json)
          MOD_VERSION=$(jq -r '.info.version' qpm.json)
          SO_NAME=$(jq -r '.info.additionalData.overrideSoName // "lib\($MOD_ID).so"' qpm.json)

          mkdir -p qmod_package
          cp build/lib/${SO_NAME} qmod_package/ 2>/dev/null || cp build/${SO_NAME} qmod_package/ || true

          # Fill in mod.json from template
          cat mod.template.json \
            | jq --arg v "$MOD_VERSION" '.version = $v' \
            > qmod_package/mod.json

          # Copy cover art if present
          [ -f cover.png ] && cp cover.png qmod_package/

          cd qmod_package
          zip -r "../${MOD_ID}_v${MOD_VERSION}.qmod" .
          cd ..

      - name: Upload qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: slicevisualizer-qmod
          path: "*.qmod"
          if-no-files-found: error
